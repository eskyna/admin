baseURL = "https://eskyna.com/admin/"
languageCode = "de-DE"
title = "ESKYNA Medienstudio"
publishDir = "public"
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]
disablePathToLower = true
enableRobotsTXT = true

[params]
  description = "Interne Medien-, Prompt-, Audio- und Markenbibliothek für das ESKYNA Social-Media-Team."
  owner = "ESKYNA"
  buildVersion = "0.4.1"
  audioEndpoint = ""

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[permalinks]
  [permalinks.page]
    docs = "/docs/:contentbasename/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
