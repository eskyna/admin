baseURL = "https://eskyna.com/admin/"
languageCode = "de-DE"
title = "ESKYNA Social Media Studio"
publishDir = "public"
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]
enableRobotsTXT = true

[params]
  description = "Interne Asset-, Prompt-, Audio- und Brand-Bibliothek für das ESKYNA Social-Media-Team."
  owner = "ESKYNA"
  buildVersion = "0.4.1"
  audioEndpoint = ""

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
