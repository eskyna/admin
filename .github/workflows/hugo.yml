name: Build and deploy protected ESKYNA admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
      NODE_VERSION: 24
      TZ: Europe/Berlin
      BASE_URL: https://eskyna.com/admin/
      BUILD_VERSION: 0.4.1
      STATICRYPT_SALT: 8d4ac1d77c284d40af09c7f44a5c1e31
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Verify repository layout
        run: bash scripts/verify-source.sh

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Hugo
        run: |
          curl -sfL --output-dir "${{ runner.temp }}" -O "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${{ runner.temp }}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Verify admin password secret
        env:
          STATICRYPT_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [[ -z "${STATICRYPT_PASSWORD}" ]]; then
            echo "::error::Repository secret ADMIN_PASSWORD is missing."
            exit 1
          fi

      - name: Build, verify and encrypt all pages
        env:
          EMBED_MEDIA: "false"
          STATICRYPT_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: bash scripts/build-protected.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: false
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
