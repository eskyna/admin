prompts:
  - id: "instagram-carousel"
    title: "Instagram-Karussell entwickeln"
    category: "copy"
    category_label: "Texte"
    platform: "Instagram"
    description: "Erstellt eine klare Karussell-Dramaturgie mit Einstieg, Nutzwert und ruhigem Handlungsaufruf."
    updated: "20.07.2026"
    tags: ["karussell", "instagram", "wissen", "handlungsaufruf"]
    variables: ["THEMA", "ZIELGRUPPE", "ANZAHL SLIDES", "ANGEBOT"]
    body: |-
      Du arbeitest als erfahrene Social-Media-Redakteurin für ESKYNA, eine Marke für Style- und Imagecoaching.

      Entwickle ein Instagram-Karussell zum Thema {{THEMA}} für {{ZIELGRUPPE}} mit {{ANZAHL SLIDES}} Folien.

      Anforderungen:
      - Ton: klar, warm, souverän, persönlich; Premium ohne elitär zu klingen.
      - Eine Hauptaussage pro Folie.
      - Folie 1: konkreter Einstieg ohne Clickbait.
      - Mittlere Folien: nachvollziehbare Beispiele aus Alltag, Garderobe oder Auftreten.
      - Vorletzte Folie: kompakte Zusammenfassung.
      - Letzte Folie: sanfter Handlungsaufruf zu {{ANGEBOT}}.
      - Keine abwertende Sprache über Körper, Alter oder Stil.
      - Keine Superlative und keine künstliche Verknappung.

      Liefere:
      1. Folientexte mit maximal 28 Wörtern je Folie.
      2. Bildunterschrift mit 900-1.300 Zeichen.
      3. Drei alternative Einstiege.
      4. Alternativtext für Barrierefreiheit.

  - id: "linkedin-thought-leadership"
    title: "LinkedIn-Fachbeitrag"
    category: "copy"
    category_label: "Texte"
    platform: "LinkedIn"
    description: "Übersetzt eine Beobachtung aus Stil und Wirkung in einen fachlichen LinkedIn-Beitrag."
    updated: "20.07.2026"
    tags: ["linkedin", "persönliche-marke", "expertise", "b2b"]
    variables: ["BEOBACHTUNG", "KERNAUSSAGE", "BEISPIEL", "HANDLUNGSAUFRUF"]
    body: |-
      Schreibe einen LinkedIn-Beitrag für Natalia Kleemann / ESKYNA.

      Ausgangspunkt: {{BEOBACHTUNG}}
      Kernaussage: {{KERNAUSSAGE}}
      Konkretes Beispiel: {{BEISPIEL}}
      Gewünschter Handlungsaufruf: {{HANDLUNGSAUFRUF}}

      Struktur:
      - starke, ruhige Einstiegsbeobachtung in 1-2 Zeilen
      - kurze fachliche Einordnung
      - konkretes Beispiel
      - 3 umsetzbare Gedanken oder Fragen
      - persönlicher Abschluss mit offenem Handlungsaufruf

      Stil:
      - souverän, reflektiert und nahbar
      - kurze Absätze, keine Modeworte
      - keine pauschalen Stilregeln
      - 1.000-1.500 Zeichen
      - maximal drei relevante Hashtags

  - id: "campaign-concept"
    title: "Kampagnenkonzept in 30 Minuten"
    category: "campaign"
    category_label: "Kampagne"
    platform: "Mehrkanal"
    description: "Erzeugt Leitidee, Inhaltssäulen, Formate und Messkriterien für eine Kampagne."
    updated: "20.07.2026"
    tags: ["kampagne", "planung", "inhaltssäulen", "kennzahlen"]
    variables: ["ZIEL", "ZIELGRUPPE", "ANGEBOT", "ZEITRAUM", "KANAELE"]
    body: |-
      Entwickle ein kompaktes Social-Media-Kampagnenkonzept für ESKYNA.

      Ziel: {{ZIEL}}
      Zielgruppe: {{ZIELGRUPPE}}
      Angebot oder Thema: {{ANGEBOT}}
      Zeitraum: {{ZEITRAUM}}
      Kanäle: {{KANAELE}}

      Berücksichtige die Markenprinzipien Klarheit, Wertigkeit, persönliche Beratung und bewusste Entscheidungen.

      Liefere:
      1. Eine Leitidee in einem Satz.
      2. Drei mögliche Kampagnennamen.
      3. Vier Content-Säulen mit jeweiligem Nutzen.
      4. Einen realistischen Redaktionsplan nach Kanal und Woche.
      5. Je drei Einstiege für Aufmerksamkeit, Interesse und Entscheidung.
      6. Benötigte Medien und offene Produktionsfragen.
      7. Messbare Kennzahlen mit einer kurzen Begründung.
      8. Risiken für Marke oder Glaubwürdigkeit und passende Gegenmaßnahmen.

  - id: "image-background"
    title: "KI-Hintergrund für Social Media"
    category: "image"
    category_label: "Bild & Design"
    platform: "Bildgenerierung"
    description: "Formuliert einen kontrollierten Bildprompt für ruhige ESKYNA-Hintergründe."
    updated: "20.07.2026"
    tags: ["bild", "hintergrund", "redaktionell", "marke"]
    variables: ["FORMAT", "FARBWELT", "TEXTZONE", "STIMMUNG", "MATERIAL"]
    body: |-
      Erstelle einen hochwertigen redaktionellen Hintergrund für ESKYNA Social Media.

      Format: {{FORMAT}}
      Farbwelt: {{FARBWELT}}
      Freigehaltener Negativraum für Text: {{TEXTZONE}}
      Stimmung: {{STIMMUNG}}
      Material oder Textur: {{MATERIAL}}

      Visuelle Richtung:
      - ruhige Premium-Ästhetik, warmes europäisches Editorial
      - großzügiger Negativraum und klare Bildhierarchie
      - dezente organische Geometrie, feine Goldakzente, weiches natürliches Licht
      - taktile, glaubwürdige Materialien und zurückhaltende Tiefe
      - keine Personen, kein Text, keine Logos, keine Modeprodukte
      - keine glänzende 3D-Render-Optik, keine Neonfarben, keine unruhigen Muster, keine generischen Stock-Motive

      Das Ergebnis soll gut zuschneidbar bleiben und hinter dunkler oder elfenbeinfarbener Typografie lesbar sein.

  - id: "brand-quality-check"
    title: "Marken- und Qualitätscheck"
    category: "quality"
    category_label: "Qualität"
    platform: "Prüfung"
    description: "Prüft Entwürfe gegen Tonalität, Erscheinungsbild, Nutzwert und sensible Aussagen."
    updated: "20.07.2026"
    tags: ["prüfung", "qualität", "tonalität", "erscheinungsbild"]
    variables: ["ENTWURF", "KANAL", "ZIEL", "HANDLUNGSAUFRUF"]
    body: |-
      Prüfe den folgenden Social-Media-Entwurf für ESKYNA.

      Kanal: {{KANAL}}
      Ziel: {{ZIEL}}
      Geplanter Handlungsaufruf: {{HANDLUNGSAUFRUF}}

      Entwurf:
      {{ENTWURF}}

      Bewerte von 1-5 und begründe knapp:
      - Klarheit der Hauptaussage
      - Markentonalität: klar, warm, souverän, persönlich
      - konkreter Nutzwert
      - Glaubwürdigkeit und fachliche Sorgfalt
      - respektvolle Sprache ohne Körper- oder Altersabwertung
      - Passung des Handlungsaufrufs
      - visuelle Umsetzbarkeit

      Markiere problematische Formulierungen direkt und liefere anschließend eine verbesserte Fassung, ohne die Aussage unnötig zu verlängern.
